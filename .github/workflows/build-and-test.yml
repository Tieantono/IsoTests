name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iso_test_db

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          dotnet-quality: 'ga'
          
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5432;Database=${{ env.POSTGRES_DB }};Username=postgres;Password=${{ env.POSTGRES_PASSWORD }}"
        run: dotnet run --project ./tests/IsoTests.Tests --no-build -- --coverage --coverage-output-format cobertura --coverage-output ./coverage.cobertura.xml

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.16
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: Html;MarkdownSummary
      
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoverageReport
          path: coveragereport

      - name: Add comment to PR
        if: github.event_name == 'pull_request'
        run: gh pr comment $PR_NUMBER --edit-last --create-if-none --body-file coveragereport/Summary.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
    
      - name: Publish coverage in build summary
        run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY
        shell: bash
